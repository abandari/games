<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Chess</title>
<style>
@font-face{font-family:'Cinzel';font-style:normal;font-weight:400 900;font-display:swap;src:url('/static/fonts/cinzel-ext.woff2') format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF}
@font-face{font-family:'Cinzel';font-style:normal;font-weight:400 900;font-display:swap;src:url('/static/fonts/cinzel.woff2') format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}
@font-face{font-family:'Cinzel Decorative';font-style:normal;font-weight:400;font-display:swap;src:url('/static/fonts/cinzel-deco-400-ext.woff2') format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF}
@font-face{font-family:'Cinzel Decorative';font-style:normal;font-weight:400;font-display:swap;src:url('/static/fonts/cinzel-deco-400.woff2') format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}
@font-face{font-family:'Cinzel Decorative';font-style:normal;font-weight:700;font-display:swap;src:url('/static/fonts/cinzel-deco-700-ext.woff2') format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF}
@font-face{font-family:'Cinzel Decorative';font-style:normal;font-weight:700;font-display:swap;src:url('/static/fonts/cinzel-deco-700.woff2') format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--gold-l:#F0D080;--gold-d:#8B6914;--bg:#0d0d1f;--panel:#111128;--lsq:#F0D9B5;--dsq:#B58863;}
body{background:var(--bg);background-image:radial-gradient(ellipse at 50% 0%,#1a1a3a 0%,#0d0d1f 65%);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Georgia',serif;color:#e8d5b7;}

/* SETUP */
#setup{display:flex;flex-direction:column;align-items:center;gap:36px;animation:fadeUp .7s ease}
.game-title{font-family:'Cinzel Decorative','Georgia',serif;font-size:58px;font-weight:700;color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,.55),0 0 80px rgba(201,168,76,.2);letter-spacing:10px;}
.game-sub{font-family:'Cinzel','Georgia',serif;font-size:13px;color:#7a6a4a;letter-spacing:5px;text-transform:uppercase;margin-top:-26px;}
.setup-lbl{font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;opacity:.8;margin-bottom:12px;text-align:center;}
.color-row{display:flex;gap:20px}
.col-btn{width:108px;height:108px;border-radius:14px;border:2px solid var(--gold-d);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .3s;background:rgba(255,255,255,.03);font-family:'Cinzel','Georgia',serif;font-size:10px;letter-spacing:2px;color:#7a6a4a;}
.col-btn .ci{font-size:54px;line-height:1}
.col-btn.w .ci{color:#f5f0e0;text-shadow:0 2px 6px rgba(0,0,0,.8),0 0 20px rgba(255,255,200,.3)}
.col-btn.b .ci{color:#1a1a2a;text-shadow:0 2px 4px rgba(0,0,0,.9)}
.col-btn:hover,.col-btn.sel{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold);box-shadow:0 0 22px rgba(201,168,76,.35);transform:translateY(-3px);}
.diff-row{display:flex;gap:14px}
.diff-btn{padding:12px 28px;border-radius:8px;border:2px solid var(--gold-d);cursor:pointer;font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:3px;color:#7a6a4a;background:rgba(255,255,255,.03);transition:all .3s;text-transform:uppercase;}
.diff-btn:hover,.diff-btn.sel{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.3);}
.start-btn{padding:16px 72px;border-radius:10px;border:2px solid var(--gold);cursor:pointer;font-family:'Cinzel','Georgia',serif;font-size:15px;letter-spacing:5px;color:#0d0d1f;background:linear-gradient(135deg,var(--gold),var(--gold-d));transition:all .3s;text-transform:uppercase;font-weight:700;box-shadow:0 0 32px rgba(201,168,76,.4);}
.start-btn:hover{background:linear-gradient(135deg,var(--gold-l),var(--gold));box-shadow:0 0 55px rgba(201,168,76,.65);transform:translateY(-2px);}

/* GAME */
#game{display:none;flex-direction:row;gap:28px;align-items:center;padding:20px}
.board-frame{padding:24px;background:linear-gradient(145deg,#4a3008 0%,#7a5520 18%,#3a2408 38%,#6a4818 58%,#2a1c06 78%,#5a3e14 100%);border-radius:10px;box-shadow:0 28px 70px rgba(0,0,0,.9),0 10px 30px rgba(0,0,0,.65),0 0 80px rgba(139,105,20,.45),inset 4px 4px 0 rgba(255,205,80,.18),inset -4px -4px 0 rgba(0,0,0,.5);border:2px solid #9a7828;position:relative;}
.board-frame::before{content:'';position:absolute;inset:10px;border-radius:6px;box-shadow:inset 0 0 30px rgba(0,0,0,.55);pointer-events:none;z-index:10;}
.board-with-ranks{display:flex}
.rank-labels{display:flex;flex-direction:column;margin-right:6px;width:16px;}
.rank-labels span{height:72px;line-height:72px;font-family:'Cinzel','Georgia',serif;font-size:11px;color:var(--gold);opacity:.7;text-align:center;}
.chess-board{display:grid;grid-template-columns:repeat(8,72px);grid-template-rows:repeat(8,72px);border:3px solid rgba(201,168,76,.65);box-shadow:inset 0 0 25px rgba(0,0,0,.45),0 0 0 1px rgba(0,0,0,.5);}
.file-labels{display:flex;margin-top:6px;margin-left:22px;}
.file-labels span{width:72px;text-align:center;font-family:'Cinzel','Georgia',serif;font-size:11px;color:var(--gold);opacity:.7;}

/* SQUARES */
.sq{width:72px;height:72px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.sq.light{background:radial-gradient(ellipse at 35% 30%,#f8e8c8 0%,#e4c898 55%,#bda070 100%)}
.sq.dark{background:radial-gradient(ellipse at 35% 30%,#c89060 0%,#9e6e38 55%,#7a5020 100%)}
.sq.sel-sq{background:#f6f669!important;box-shadow:inset 0 0 12px rgba(200,200,0,.4)}
.sq.lm-from,.sq.lm-to{background:rgba(20,85,30,.42)!important}
.sq.check-sq{background:rgba(210,0,0,.5)!important;animation:chkPulse 1s infinite alternate}
@keyframes chkPulse{from{background:rgba(210,0,0,.4)!important}to{background:rgba(210,0,0,.8)!important}}
.sq.leg-empty::after{content:'';position:absolute;width:32%;height:32%;border-radius:50%;background:rgba(0,0,0,.22);pointer-events:none;z-index:2;}
.sq.leg-cap::after{content:'';position:absolute;width:100%;height:100%;border:6px solid rgba(0,0,0,.22);border-radius:50%;background:transparent;pointer-events:none;z-index:2;}

/* PIECES — SVG 3D */
.piece-svg{pointer-events:none;position:relative;z-index:1;display:block;
  transition:transform .15s,filter .15s;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.55)) drop-shadow(0 1px 2px rgba(0,0,0,.4));}
.sq:hover .piece-svg{transform:scale(1.1) translateY(-3px);
  filter:drop-shadow(0 8px 14px rgba(0,0,0,.7)) drop-shadow(0 2px 3px rgba(0,0,0,.5));}
.sq.sel-sq .piece-svg{transform:scale(1.12) translateY(-4px);
  filter:drop-shadow(0 9px 16px rgba(0,0,0,.75)) drop-shadow(0 0 14px rgba(201,168,76,.5));}

/* SIDE PANEL */
.side-panel{display:flex;flex-direction:column;gap:14px;width:210px}
.card{background:rgba(17,17,40,.85);border:1px solid rgba(201,168,76,.22);border-radius:12px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,.35);}
.card-title{font-family:'Cinzel','Georgia',serif;font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;opacity:.8;}
#status-text{font-family:'Cinzel','Georgia',serif;font-size:14px;color:#e8d5b7;text-align:center;min-height:22px;transition:color .3s;}
#thinking{display:none;text-align:center;color:var(--gold);font-size:11px;letter-spacing:3px;animation:pulse 1.4s infinite;margin-top:4px;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.cap-row{display:flex;flex-wrap:wrap;gap:1px;min-height:24px;align-items:center;}
.cap-pc{font-size:18px;line-height:1}
.cap-pc.wp{color:#f5efe0;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.cap-pc.bp{color:#1c1c2e;text-shadow:1px 1px 0 #b0a060,0 1px 3px rgba(0,0,0,.8)}
#move-list{max-height:190px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gold-d) transparent;}
.mrow{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;}
.mn{color:var(--gold);opacity:.6;min-width:24px}.mw,.mb{min-width:56px;color:#e8d5b7;font-family:monospace;font-size:13px;}
.act-btn{width:100%;padding:9px;border-radius:7px;border:1px solid var(--gold-d);cursor:pointer;font-family:'Cinzel','Georgia',serif;font-size:10px;letter-spacing:2px;color:#e8d5b7;background:rgba(255,255,255,.03);transition:all .3s;text-transform:uppercase;margin-bottom:7px;}
.act-btn:last-child{margin-bottom:0}
.act-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold)}
.act-btn.undo{border-color:#3a6a7a;color:#70a5b8}
.act-btn.undo:hover{border-color:#70a5b8;background:rgba(112,165,184,.1)}
.notif-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.notif-lbl{font-family:'Cinzel','Georgia',serif;font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;}
.tog{position:relative;width:36px;height:20px;cursor:pointer;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;top:0;left:0;right:0;bottom:0;background:#2a2a4a;border-radius:20px;border:1px solid rgba(201,168,76,.3);transition:.3s;}
.tog-thumb{position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:var(--gold-d);border-radius:50%;transition:.3s;}
.tog input:checked+.tog-track{background:rgba(201,168,76,.2);border-color:var(--gold);}
.tog input:checked~.tog-thumb{transform:translateX(16px);background:var(--gold);}

/* TOASTS */
#toasts{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:rgba(10,10,28,.97);border:1px solid rgba(201,168,76,.38);border-radius:10px;padding:10px 16px;font-family:'Cinzel','Georgia',serif;color:#e8d5b7;min-width:190px;max-width:270px;box-shadow:0 4px 22px rgba(0,0,0,.55);display:flex;align-items:center;gap:10px;animation:tIn .3s ease;pointer-events:auto;}
.toast.out{animation:tOut .3s ease forwards;}
.ti{font-size:17px;flex-shrink:0}
.tb{display:flex;flex-direction:column;gap:2px}
.tt{color:var(--gold);font-size:10px;letter-spacing:3px;text-transform:uppercase}
.tm{font-size:12px;color:#e8d5b7}
.toast.tc{border-color:rgba(255,80,80,.5)}.toast.tc .tt{color:#ff8888}
@keyframes tIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}

/* PROMOTION */
#promo-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center;}
.promo-box{background:var(--panel);border:2px solid var(--gold);border-radius:16px;padding:32px;text-align:center;box-shadow:0 0 65px rgba(201,168,76,.45);}
.promo-box h3{font-family:'Cinzel','Georgia',serif;color:var(--gold);letter-spacing:4px;margin-bottom:22px;font-size:13px;}
.promo-pieces{display:flex;gap:14px;}
.pp-btn{width:84px;height:84px;border-radius:10px;border:2px solid var(--gold-d);cursor:pointer;background:rgba(255,255,255,.03);transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:54px;line-height:1;}
.pp-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.15);transform:scale(1.1);}

/* GAME OVER */
#gameover{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:90;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.go-box{text-align:center;animation:popIn .5s ease}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.go-title{font-family:'Cinzel Decorative','Georgia',serif;font-size:52px;color:var(--gold);text-shadow:0 0 50px rgba(201,168,76,.65);margin-bottom:8px;}
.go-sub{font-family:'Cinzel','Georgia',serif;font-size:19px;color:#e8d5b7;letter-spacing:4px;margin-bottom:30px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="game-title">♔ CHESS ♚</div>
  <div class="game-sub">A Royal Game</div>
  <div>
    <div class="setup-lbl">Choose Your Color</div>
    <div class="color-row">
      <div class="col-btn w sel" id="btn-white" onclick="pickColor('white')">
        <span class="ci">♔</span><span>WHITE</span>
      </div>
      <div class="col-btn b" id="btn-black" onclick="pickColor('black')">
        <span class="ci">♚</span><span>BLACK</span>
      </div>
    </div>
  </div>
  <div>
    <div class="setup-lbl">Difficulty</div>
    <div class="diff-row">
      <div class="diff-btn" id="d-beginner" onclick="pickDiff('beginner',this)">Beginner</div>
      <div class="diff-btn sel" id="d-medium" onclick="pickDiff('medium',this)">Medium</div>
      <div class="diff-btn" id="d-hard" onclick="pickDiff('hard',this)">Hard</div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">Begin Game</button>
</div>

<!-- GAME -->
<div id="game">
  <div class="side-panel">
    <div class="card">
      <div class="card-title">Captured by You</div>
      <div class="cap-row" id="cap-player"></div>
    </div>
    <div class="card">
      <div class="card-title">Status</div>
      <div id="status-text">Your turn</div>
      <div id="thinking">Thinking…</div>
    </div>
    <div class="card">
      <div class="card-title">Captured by Computer</div>
      <div class="cap-row" id="cap-cpu"></div>
    </div>
    <div class="card">
      <div class="card-title">Move History</div>
      <div id="move-list"></div>
    </div>
    <div class="card">
      <div class="notif-row">
        <span class="notif-lbl">Notifications</span>
        <label class="tog">
          <input type="checkbox" id="notif-chk" checked onchange="notifsOn=this.checked">
          <div class="tog-track"></div>
          <div class="tog-thumb"></div>
        </label>
      </div>
      <button class="act-btn undo" onclick="undoMove()">↩ Retract Move</button>
      <button class="act-btn" onclick="newGame()">New Game</button>
    </div>
  </div>

  <div class="board-frame">
    <div class="board-with-ranks">
      <div class="rank-labels" id="rlabels"></div>
      <div class="chess-board" id="board"></div>
    </div>
    <div class="file-labels" id="flabels"></div>
  </div>
</div>

<!-- PROMOTION -->
<div id="promo-modal">
  <div class="promo-box">
    <h3>PROMOTE PAWN</h3>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <div class="go-box">
    <div class="go-title" id="go-title">CHECKMATE</div>
    <div class="go-sub" id="go-sub"></div>
    <button class="start-btn" onclick="newGame()">Play Again</button>
  </div>
</div>

<div id="toasts"></div>

<script>
// ── PIECE SYMBOLS (setup screen only) ─────────
const SYM = {
  white:{K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'},
  black:{K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'}
};

// ── 3-D SVG PIECE FACTORY ──────────────────────
function createPieceEl(pc) {
  const isW = pc.c === 'white';
  const id  = Math.random().toString(36).substr(2, 8);

  // Palette
  const hi  = isW ? '#fff8ee' : '#6868a8';
  const mid = isW ? '#d4a86a' : '#252548';
  const drk = isW ? '#6a3c08' : '#080820';
  const rim = isW ? '#5a3206' : '#c8a830';

  // Shared defs: shadow, sphere radial, cylinder linear, base linear
  const defs = `<defs>
    <radialGradient id="sh${id}" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgba(0,0,0,.5)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="rg${id}" cx="33%" cy="27%" r="70%">
      <stop offset="0%"   stop-color="${hi}"/>
      <stop offset="50%"  stop-color="${mid}"/>
      <stop offset="100%" stop-color="${drk}"/>
    </radialGradient>
    <linearGradient id="lg${id}" x1="12%" y1="0%" x2="88%" y2="100%">
      <stop offset="0%"   stop-color="${hi}" stop-opacity=".9"/>
      <stop offset="45%"  stop-color="${mid}"/>
      <stop offset="100%" stop-color="${drk}"/>
    </linearGradient>
    <linearGradient id="cg${id}" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="${drk}"/>
      <stop offset="28%"  stop-color="${mid}"/>
      <stop offset="55%"  stop-color="${hi}"/>
      <stop offset="100%" stop-color="${drk}"/>
    </linearGradient>
  </defs>`;

  let body = '';
  switch (pc.t) {

    case 'P': body = `
      <ellipse cx="22" cy="40" rx="10" ry="2.5" fill="url(#sh${id})"/>
      <path d="M14,37 Q14,32 16,31 Q19,30 22,30 Q25,30 28,31 Q30,32 30,37 Z"
            fill="url(#lg${id})" stroke="${rim}" stroke-width=".8"/>
      <path d="M20,30 Q19.5,27 19.5,24 Q19.5,22 22,22 Q24.5,22 24.5,24 Q24.5,27 24,30 Z"
            fill="url(#cg${id})" stroke="${rim}" stroke-width=".5"/>
      <circle cx="22" cy="17" r="7.5" fill="url(#rg${id})" stroke="${rim}" stroke-width=".8"/>
      <ellipse cx="19.5" cy="14.5" rx="2.8" ry="2" fill="${hi}" opacity=".55"/>
    `; break;

    case 'R': body = `
      <ellipse cx="22" cy="40.5" rx="12" ry="2.5" fill="url(#sh${id})"/>
      <path d="M13,37 Q12,32 14,31 Q17,30 22,30 Q27,30 30,31 Q32,32 31,37 Z"
            fill="url(#lg${id})" stroke="${rim}" stroke-width=".8"/>
      <rect x="16.5" y="17" width="11" height="13.5" fill="url(#cg${id})" stroke="${rim}" stroke-width=".5"/>
      <path d="M15,17 L15,12 L18,12 L18,17 M20.5,17 L20.5,12 L23.5,12 L23.5,17 M26,17 L26,12 L29,12 L29,17"
            fill="url(#cg${id})" stroke="${rim}" stroke-width=".7"/>
      <rect x="14.5" y="17" width="15" height="1.5" fill="${rim}" opacity=".5"/>
      <ellipse cx="20" cy="19" rx="3" ry="1.2" fill="${hi}" opacity=".4"/>
    `; break;

    case 'N': body = `
      <ellipse cx="22" cy="40.5" rx="12" ry="2.5" fill="url(#sh${id})"/>
      <path d="M13,37 Q12,32 14,31 Q17,30 22,30 Q27,30 30,31 Q32,32 31,37 Z"
            fill="url(#lg${id})" stroke="${rim}" stroke-width=".8"/>
      <path d="M19,30 L18,26 Q16.5,22 18,19 Q18,17 17,15 L19,12 L20.5,9 L19,6
               L23,9 L26,9 Q29,11 29,15 Q29,18.5 27.5,20.5 Q29.5,20.5 30,21.5

// ── CONSTANTS ──────────────────────────────────
const WC='white', BC='black';
const VAL = {P:100,N:320,B:330,R:500,Q:900,K:20000};
const PST = {
  P:[[0,0,0,0,0,0,0,0],[50,50,50,50,50,50,50,50],[10,10,20,30,30,20,10,10],[5,5,10,25,25,10,5,5],[0,0,0,20,20,0,0,0],[5,-5,-10,0,0,-10,-5,5],[5,10,10,-20,-20,10,10,5],[0,0,0,0,0,0,0,0]],
  N:[[-50,-40,-30,-30,-30,-30,-40,-50],[-40,-20,0,0,0,0,-20,-40],[-30,0,10,15,15,10,0,-30],[-30,5,15,20,20,15,5,-30],[-30,0,15,20,20,15,0,-30],[-30,5,10,15,15,10,5,-30],[-40,-20,0,5,5,0,-20,-40],[-50,-40,-30,-30,-30,-30,-40,-50]],
  B:[[-20,-10,-10,-10,-10,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,10,10,5,0,-10],[-10,5,5,10,10,5,5,-10],[-10,0,10,10,10,10,0,-10],[-10,10,10,10,10,10,10,-10],[-10,5,0,0,0,0,5,-10],[-20,-10,-10,-10,-10,-10,-10,-20]],
  R:[[0,0,0,0,0,0,0,0],[5,10,10,10,10,10,10,5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[0,0,0,5,5,0,0,0]],
  Q:[[-20,-10,-10,-5,-5,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,5,5,5,0,-10],[-5,0,5,5,5,5,0,-5],[0,0,5,5,5,5,0,-5],[-10,5,5,5,5,5,0,-10],[-10,0,5,0,0,0,0,-10],[-20,-10,-10,-5,-5,-10,-10,-20]],
  K:[[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-20,-30,-30,-40,-40,-30,-30,-20],[-10,-20,-20,-20,-20,-20,-20,-10],[20,20,0,0,0,0,20,20],[20,30,10,0,0,10,30,20]]
};

// ── GAME STATE ─────────────────────────────────
let board, turn, playerColor, difficulty;
let selSq, legalMvs, lastMv, cr, ep;
let history, capPlayer, capCPU;
let gameOver, cpuBusy, pendingPromo;
let setupColor=WC, setupDiff='medium';

const opp  = c => c===WC ? BC : WC;
const inB  = (r,c) => r>=0&&r<8&&c>=0&&c<8;
const cpyB = b => b.map(r=>r.map(c=>c?{...c}:null));

function initBoard() {
  board = Array(8).fill(null).map(()=>Array(8).fill(null));
  const br=['R','N','B','Q','K','B','N','R'];
  for (let c=0;c<8;c++) {
    board[0][c]={t:br[c],c:BC}; board[1][c]={t:'P',c:BC};
    board[6][c]={t:'P',  c:WC}; board[7][c]={t:br[c],c:WC};
  }
}

// ── MOVE GENERATION ────────────────────────────
function rawMoves(r,c,b,epSq,castR) {
  const p=b[r][c]; if(!p) return[];
  const col=p.c, en=opp(col), mvs=[], dir=col===WC?-1:1;

  function push(tr,tc,fl={}) {
    if(!inB(tr,tc)) return;
    const t=b[tr][tc];
    if(!t||t.c!==col) mvs.push({fr:{r,c},to:{r:tr,c:tc},...fl});
  }
  function slide(dr,dc) {
    let tr=r+dr,tc=c+dc;
    while(inB(tr,tc)) {
      const t=b[tr][tc];
      if(t){if(t.c!==col)mvs.push({fr:{r,c},to:{r:tr,c:tc}});break;}
      mvs.push({fr:{r,c},to:{r:tr,c:tc}});
      tr+=dr; tc+=dc;
    }
  }

  switch(p.t) {
    case'P': {
      const tr1=r+dir;
      if(inB(tr1,c)&&!b[tr1][c]) {
        const promo=tr1===0||tr1===7;
        mvs.push({fr:{r,c},to:{r:tr1,c},promo});
        const sr=col===WC?6:1;
        if(r===sr){const tr2=r+2*dir;if(!b[tr2][c])mvs.push({fr:{r,c},to:{r:tr2,c},dbl:true});}
      }
      for(const dc of[-1,1]) {
        const tc=c+dc;
        if(inB(tr1,tc)) {
          const t=b[tr1][tc];
          if(t&&t.c===en) mvs.push({fr:{r,c},to:{r:tr1,c:tc},promo:tr1===0||tr1===7});
          if(epSq&&tr1===epSq.r&&tc===epSq.c) mvs.push({fr:{r,c},to:{r:tr1,c:tc},ep:true});
        }
      }
      break;
    }
    case'N': for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]])push(r+dr,c+dc); break;
    case'B': slide(-1,-1);slide(-1,1);slide(1,-1);slide(1,1); break;
    case'R': slide(-1,0);slide(1,0);slide(0,-1);slide(0,1); break;
    case'Q': slide(-1,-1);slide(-1,1);slide(1,-1);slide(1,1);slide(-1,0);slide(1,0);slide(0,-1);slide(0,1); break;
    case'K': {
      for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) if(dr||dc) push(r+dr,c+dc);
      if(castR) {
        if(col===WC&&r===7&&c===4) {
          if(castR.wK&&!b[7][5]&&!b[7][6]&&b[7][7]?.t==='R'&&b[7][7]?.c===WC) mvs.push({fr:{r,c},to:{r:7,c:6},castle:'K'});
          if(castR.wQ&&!b[7][3]&&!b[7][2]&&!b[7][1]&&b[7][0]?.t==='R'&&b[7][0]?.c===WC) mvs.push({fr:{r,c},to:{r:7,c:2},castle:'Q'});
        }
        if(col===BC&&r===0&&c===4) {
          if(castR.bK&&!b[0][5]&&!b[0][6]&&b[0][7]?.t==='R'&&b[0][7]?.c===BC) mvs.push({fr:{r,c},to:{r:0,c:6},castle:'K'});
          if(castR.bQ&&!b[0][3]&&!b[0][2]&&!b[0][1]&&b[0][0]?.t==='R'&&b[0][0]?.c===BC) mvs.push({fr:{r,c},to:{r:0,c:2},castle:'Q'});
        }
      }
      break;
    }
  }
  return mvs;
}

function attacked(r,c,byCol,b) {
  for(let rr=0;rr<8;rr++) for(let cc=0;cc<8;cc++) {
    const p=b[rr][cc];
    if(p&&p.c===byCol) {
      const ms=rawMoves(rr,cc,b,null,null);
      if(ms.some(m=>m.to.r===r&&m.to.c===c)) return true;
    }
  }
  return false;
}
function kingPos(col,b){for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(b[r][c]?.t==='K'&&b[r][c]?.c===col)return{r,c};return null;}
function inCheck(col,b){const k=kingPos(col,b);return k?attacked(k.r,k.c,opp(col),b):true;}

function applyMv(mv,b,castR,col) {
  const nb=cpyB(b),ncr={...castR};let nep=null;
  const p=nb[mv.fr.r][mv.fr.c];
  nb[mv.to.r][mv.to.c]=p; nb[mv.fr.r][mv.fr.c]=null;
  if(mv.ep) nb[mv.fr.r][mv.to.c]=null;
  if(mv.castle){const rr=mv.to.r;if(mv.castle==='K'){nb[rr][5]=nb[rr][7];nb[rr][7]=null;}else{nb[rr][3]=nb[rr][0];nb[rr][0]=null;}}
  if(mv.promT) nb[mv.to.r][mv.to.c]={t:mv.promT,c:col};
  if(p.t==='K'){if(col===WC){ncr.wK=false;ncr.wQ=false;}else{ncr.bK=false;ncr.bQ=false;}}
  if(p.t==='R'){
    if(mv.fr.r===7&&mv.fr.c===7)ncr.wK=false;if(mv.fr.r===7&&mv.fr.c===0)ncr.wQ=false;
    if(mv.fr.r===0&&mv.fr.c===7)ncr.bK=false;if(mv.fr.r===0&&mv.fr.c===0)ncr.bQ=false;
  }
  if(mv.to.r===7&&mv.to.c===7)ncr.wK=false;if(mv.to.r===7&&mv.to.c===0)ncr.wQ=false;
  if(mv.to.r===0&&mv.to.c===7)ncr.bK=false;if(mv.to.r===0&&mv.to.c===0)ncr.bQ=false;
  if(mv.dbl) nep={r:(mv.fr.r+mv.to.r)/2,c:mv.to.c};
  return{nb,ncr,nep};
}

function legalForColor(col,b,epSq,castR) {
  const mvs=[];
  for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
    const p=b[r][c]; if(!p||p.c!==col) continue;
    for(const mv of rawMoves(r,c,b,epSq,castR)) {
      if(mv.castle){if(inCheck(col,b))continue;if(attacked(mv.fr.r,mv.castle==='K'?5:3,opp(col),b))continue;}
      const{nb}=applyMv(mv,b,castR,col);
      if(!inCheck(col,nb)) mvs.push(mv);
    }
  }
  return mvs;
}
function legalForPiece(r,c,b,epSq,castR){const p=b[r][c];if(!p)return[];return legalForColor(p.c,b,epSq,castR).filter(m=>m.fr.r===r&&m.fr.c===c);}

// ── AI ─────────────────────────────────────────
function evalBoard(b) {
  let s=0;
  for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
    const p=b[r][c]; if(!p) continue;
    const tr=p.c===WC?r:7-r;
    s+=(p.c===WC?1:-1)*(VAL[p.t]+(PST[p.t]?PST[p.t][tr][c]:0));
  }
  return s;
}

function minimax(b,depth,alpha,beta,maxing,epSq,castR) {
  const col=maxing?WC:BC;
  const mvs=legalForColor(col,b,epSq,castR);
  if(!mvs.length) return inCheck(col,b)?(maxing?-1e6:1e6):0;
  if(depth===0)   return evalBoard(b);
  mvs.sort((a,bm)=>(b[bm.to.r][bm.to.c]?1:0)-(b[a.to.r][a.to.c]?1:0));
  if(maxing) {
    let best=-Infinity;
    for(const mv of mvs){const fm=mv.promo?{...mv,promT:'Q'}:mv;const{nb,ncr,nep}=applyMv(fm,b,castR,col);best=Math.max(best,minimax(nb,depth-1,alpha,beta,false,nep,ncr));alpha=Math.max(alpha,best);if(beta<=alpha)break;}
    return best;
  } else {
    let best=Infinity;
    for(const mv of mvs){const fm=mv.promo?{...mv,promT:'Q'}:mv;const{nb,ncr,nep}=applyMv(fm,b,castR,col);best=Math.min(best,minimax(nb,depth-1,alpha,beta,true,nep,ncr));beta=Math.min(beta,best);if(beta<=alpha)break;}
    return best;
  }
}

function bestMove(b,epSq,castR,col,diff) {
  const mvs=legalForColor(col,b,epSq,castR);
  if(!mvs.length) return null;
  if(diff==='beginner') return mvs[Math.floor(Math.random()*mvs.length)];
  const depth=diff==='medium'?2:4, maxing=col===WC;
  if(diff==='medium') mvs.sort(()=>Math.random()-.5);
  let best=null, bestVal=maxing?-Infinity:Infinity;
  for(const mv of mvs) {
    const fm=mv.promo?{...mv,promT:'Q'}:mv;
    const{nb,ncr,nep}=applyMv(fm,b,castR,col);
    const val=minimax(nb,depth-1,-Infinity,Infinity,!maxing,nep,ncr);
    if(maxing?val>bestVal:val<bestVal){bestVal=val;best=fm;}
  }
  return best;
}

// ── GAME LOGIC ─────────────────────────────────
function resetState() {
  initBoard(); turn=WC; selSq=null; legalMvs=[]; lastMv=null;
  cr={wK:true,wQ:true,bK:true,bQ:true}; ep=null;
  history=[]; capPlayer=[]; capCPU=[];
  gameOver=false; cpuBusy=false; pendingPromo=null;
  document.getElementById('gameover').style.display='none';
  updateStatus(); updateCap(); renderHistory();
}

function execMove(mv,promType) {
  const col=turn;
  if(mv.promo&&!mv.promT) {
    if(promType){mv={...mv,promT:promType};}
    else{pendingPromo=mv; showPromo(col); return;}
  }
  const cap=board[mv.to.r][mv.to.c];
  if(cap)   (col===playerColor?capPlayer:capCPU).push(cap);
  if(mv.ep) (col===playerColor?capPlayer:capCPU).push({t:'P',c:opp(col)});

  history.push({board:cpyB(board),cr:{...cr},ep:ep?{...ep}:null,turn,capPlayer:[...capPlayer],capCPU:[...capCPU],lastMv:lastMv?{...lastMv,fr:{...lastMv.fr},to:{...lastMv.to}}:null,mv});

  const{nb,ncr,nep}=applyMv(mv,board,cr,col);
  board=nb; cr=ncr; ep=nep; lastMv=mv; turn=opp(col);
  selSq=null; legalMvs=[];
  fireNotif(mv,cap,col,board);
  render(); updateCap(); renderHistory(); checkEnd();
  if(!gameOver&&turn!==playerColor) setTimeout(doCPU,280);
}

function fireNotif(mv,cap,col,boardAfter) {
  const prev=history[history.length-1];
  const piece=prev?.board[mv.fr.r][mv.fr.c];
  const pname=piece?PNAMES[piece.t]:'Piece';
  const tf=FILES[mv.to.c], tr=8-mv.to.r;
  const actor=col===playerColor?'You':'Computer';
  if(mv.castle)       toast('Castling',`${actor} castled ${mv.castle==='K'?'Kingside':'Queenside'}`,'tcastle');
  else if(mv.promT)   toast('Promotion!',`Pawn promoted to ${PNAMES[mv.promT]}`,'tpromo');
  else if(cap||mv.ep) toast('Capture',`${actor}: ${pname} captures on ${tf}${tr}`,'tcap');
  else                toast(actor==='You'?'Your Move':'Computer Moved',`${pname} → ${tf}${tr}`);
  if(inCheck(opp(col),boardAfter)) setTimeout(()=>toast('Check!',`${opp(col)==='white'?'White':'Black'} king is in check`,'tc'),420);
}

function showPromo(col) {
  const modal=document.getElementById('promo-modal'), cont=document.getElementById('promo-pieces');
  modal.style.display='flex'; cont.innerHTML='';
  const cls=col===WC?'wp':'bp';
  for(const t of['Q','R','B','N']) {
    const btn=document.createElement('button');
    btn.className='pp-btn';
    const sp=document.createElement('span'); sp.className=cls; sp.textContent=SYM[col][t];
    sp.style.cssText=col===WC?'color:#f5efe0;text-shadow:0 2px 6px rgba(0,0,0,.8)':'color:#1c1c2e;text-shadow:1px 1px 0 #b0a060,0 2px 6px rgba(0,0,0,.9)';
    btn.appendChild(sp);
    btn.onclick=()=>{modal.style.display='none';const mv=pendingPromo;pendingPromo=null;execMove(mv,t);};
    cont.appendChild(btn);
  }
}

function doCPU() {
  if(gameOver||turn===playerColor) return;
  cpuBusy=true;
  document.getElementById('thinking').style.display='block';
  document.getElementById('status-text').textContent='Thinking…';
  setTimeout(()=>{
    const mv=bestMove(board,ep,cr,turn,difficulty);
    cpuBusy=false;
    document.getElementById('thinking').style.display='none';
    if(mv) execMove(mv,mv.promT||(mv.promo?'Q':null));
    updateStatus();
  },60);
}

function checkEnd() {
  const mvs=legalForColor(turn,board,ep,cr);
  if(!mvs.length) {
    gameOver=true;
    if(inCheck(turn,board)){
      const winner=opp(turn);
      showEnd('CHECKMATE',winner===playerColor?'You Win!':'Computer Wins!');
      toast('Game Over',winner===playerColor?'Checkmate — you win!':'Checkmate — computer wins!','tc');
    } else {
      showEnd('STALEMATE','Draw by Stalemate');
      toast('Game Over',"Stalemate — it's a draw!");
    }
  }
  updateStatus();
}
function showEnd(title,sub){document.getElementById('go-title').textContent=title;document.getElementById('go-sub').textContent=sub;document.getElementById('gameover').style.display='flex';}

function undoMove() {
  if(gameOver){document.getElementById('gameover').style.display='none';gameOver=false;}
  if(!history.length) return;
  cpuBusy=false;
  const count=(history.length>=2&&turn===playerColor)?2:1;
  for(let i=0;i<count&&history.length;i++){const s=history.pop();board=s.board;cr=s.cr;ep=s.ep;turn=s.turn;capPlayer=s.capPlayer;capCPU=s.capCPU;lastMv=s.lastMv;}
  selSq=null; legalMvs=[];
  toast('Move Retracted','Returned to previous position');
  render(); updateCap(); renderHistory(); updateStatus();
}

// ── RENDERING ──────────────────────────────────
function d2b(dr,dc){return playerColor===WC?{r:dr,c:dc}:{r:7-dr,c:7-dc};}

function render() {
  const el=document.getElementById('board'); el.innerHTML='';
  const legSet=new Set(legalMvs.map(m=>`${m.to.r},${m.to.c}`));

  for(let dr=0;dr<8;dr++) for(let dc=0;dc<8;dc++) {
    const{r,c}=d2b(dr,dc), p=board[r][c];
    const sq=document.createElement('div');
    sq.className=`sq ${(r+c)%2===0?'light':'dark'}`;

    if(selSq&&selSq.r===r&&selSq.c===c)            sq.classList.add('sel-sq');
    if(lastMv&&lastMv.fr.r===r&&lastMv.fr.c===c)   sq.classList.add('lm-from');
    if(lastMv&&lastMv.to.r===r&&lastMv.to.c===c)   sq.classList.add('lm-to');
    if(!gameOver&&inCheck(turn,board)){const k=kingPos(turn,board);if(k&&k.r===r&&k.c===c)sq.classList.add('check-sq');}
    if(selSq&&legSet.has(`${r},${c}`)) sq.classList.add(board[r][c]?'leg-cap':'leg-empty');

    if(p) sq.appendChild(createPieceEl(p));
    sq.addEventListener('click',()=>onClick(r,c));
    el.appendChild(sq);
  }
}

function onClick(r,c) {
  if(gameOver||cpuBusy||turn!==playerColor) return;
  const p=board[r][c];
  if(selSq) {
    const mv=legalMvs.find(m=>m.to.r===r&&m.to.c===c);
    if(mv){execMove(mv);return;}
    if(p&&p.c===playerColor){selSq={r,c};legalMvs=legalForPiece(r,c,board,ep,cr);render();return;}
    selSq=null;legalMvs=[];render();return;
  }
  if(p&&p.c===playerColor){selSq={r,c};legalMvs=legalForPiece(r,c,board,ep,cr);render();}
}

function drawLabels() {
  const rl=document.getElementById('rlabels'), fl=document.getElementById('flabels');
  const ranks=playerColor===WC?[8,7,6,5,4,3,2,1]:[1,2,3,4,5,6,7,8];
  const files=playerColor===WC?['a','b','c','d','e','f','g','h']:['h','g','f','e','d','c','b','a'];
  rl.innerHTML=''; fl.innerHTML='';
  ranks.forEach(n=>{const s=document.createElement('span');s.textContent=n;rl.appendChild(s);});
  files.forEach(l=>{const s=document.createElement('span');s.textContent=l;fl.appendChild(s);});
}

function updateStatus() {
  const el=document.getElementById('status-text');
  if(gameOver){el.textContent='Game over';el.style.color='#e8d5b7';return;}
  const chk=inCheck(turn,board);
  if(turn===playerColor){el.textContent=chk?'You are in check!':'Your turn';el.style.color=chk?'#ff7070':'#e8d5b7';}
  else{el.textContent=chk?'Computer in check':"Computer's turn";el.style.color=chk?'#ff7070':'#e8d5b7';}
}

function updateCap() {
  const mk=(arr,id)=>{
    const el=document.getElementById(id); el.innerHTML='';
    arr.forEach(p=>{
      const s=document.createElement('span');
      s.className=`cap-pc ${p.c===WC?'wp':'bp'}`;
      s.style.cssText=p.c===WC?'color:#f5efe0;text-shadow:0 1px 3px rgba(0,0,0,.6)':'color:#1c1c2e;text-shadow:1px 1px 0 #b0a060';
      s.textContent=SYM[p.c][p.t];
      el.appendChild(s);
    });
  };
  mk(capPlayer,'cap-player'); mk(capCPU,'cap-cpu');
}

function mvToAN(mv,b) {
  const p=b[mv.fr.r][mv.fr.c]; if(!p) return'?';
  const tf=FILES[mv.to.c], tr=8-mv.to.r;
  if(mv.castle) return mv.castle==='K'?'O-O':'O-O-O';
  let s=''; if(p.t!=='P') s+=p.t;
  const cap=b[mv.to.r][mv.to.c]||mv.ep;
  if(p.t==='P'&&cap) s+=FILES[mv.fr.c]; if(cap) s+='x';
  s+=tf+tr; if(mv.promT) s+='='+mv.promT;
  return s;
}

function renderHistory() {
  const el=document.getElementById('move-list'); el.innerHTML='';
  for(let i=0;i<history.length;i+=2) {
    const w=history[i],bl=history[i+1];
    const div=document.createElement('div'); div.className='mrow';
    const mn=document.createElement('span'); mn.className='mn'; mn.textContent=`${i/2+1}.`;
    const mw=document.createElement('span'); mw.className='mw'; mw.textContent=mvToAN(w.mv,w.board);
    const mb=document.createElement('span'); mb.className='mb'; mb.textContent=bl?mvToAN(bl.mv,bl.board):'';
    div.appendChild(mn); div.appendChild(mw); div.appendChild(mb);
    el.appendChild(div);
  }
  el.scrollTop=el.scrollHeight;
}
</script>
