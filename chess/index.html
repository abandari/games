<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Chess</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;--gold-l:#F0D080;--gold-d:#8B6914;
  --bg:#0d0d1f;--panel:#111128;
  --lsq:#F0D9B5;--dsq:#B58863;
}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 50% 0%,#1a1a3a 0%,#0d0d1f 65%);
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;font-family:'Georgia',serif;color:#e8d5b7;
}

/* ── SETUP ── */
#setup{display:flex;flex-direction:column;align-items:center;gap:36px;animation:fadeUp .7s ease}
.game-title{
  font-family:'Cinzel Decorative','Georgia',serif;
  font-size:58px;font-weight:700;color:var(--gold);
  text-shadow:0 0 40px rgba(201,168,76,.55),0 0 80px rgba(201,168,76,.2);
  letter-spacing:10px;
}
.game-sub{font-family:'Cinzel','Georgia',serif;font-size:13px;color:#7a6a4a;letter-spacing:5px;text-transform:uppercase;margin-top:-26px;}
.setup-lbl{font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;opacity:.8;margin-bottom:12px;text-align:center;}
.color-row{display:flex;gap:20px}
.col-btn{width:108px;height:108px;border-radius:14px;border:2px solid var(--gold-d);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all .3s;background:rgba(255,255,255,.03);font-family:'Cinzel','Georgia',serif;font-size:10px;letter-spacing:2px;color:#7a6a4a;}
.col-btn:hover,.col-btn.sel{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold);box-shadow:0 0 22px rgba(201,168,76,.35);transform:translateY(-3px);}
.ci-setup{width:54px;height:54px}
.diff-row{display:flex;gap:14px}
.diff-btn{padding:12px 28px;border-radius:8px;border:2px solid var(--gold-d);cursor:pointer;font-family:'Cinzel','Georgia',serif;font-size:11px;letter-spacing:3px;color:#7a6a4a;background:rgba(255,255,255,.03);transition:all .3s;text-transform:uppercase;}
.diff-btn:hover,.diff-btn.sel{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.3);}
.start-btn{padding:16px 72px;border-radius:10px;border:2px solid var(--gold);cursor:pointer;font-family:'Cinzel','Georgia',serif;font-size:15px;letter-spacing:5px;color:#0d0d1f;background:linear-gradient(135deg,var(--gold),var(--gold-d));transition:all .3s;text-transform:uppercase;font-weight:700;box-shadow:0 0 32px rgba(201,168,76,.4);}
.start-btn:hover{background:linear-gradient(135deg,var(--gold-l),var(--gold));box-shadow:0 0 55px rgba(201,168,76,.65);transform:translateY(-2px);}

/* ── GAME ── */
#game{display:none;flex-direction:row;gap:28px;align-items:center;padding:20px}

/* Board */
.board-frame{padding:18px;background:linear-gradient(145deg,#2a1f0a,#5a3e14,#3a2a0a,#4a3510);border-radius:6px;box-shadow:0 0 70px rgba(139,105,20,.65),0 0 140px rgba(139,105,20,.3),inset 0 0 40px rgba(0,0,0,.5);border:1px solid #6a5010;}
.board-with-ranks{display:flex;gap:0}
.rank-labels{display:flex;flex-direction:column;padding:0;margin-right:6px;width:16px;}
.rank-labels span{height:72px;line-height:72px;font-family:'Cinzel','Georgia',serif;font-size:11px;color:var(--gold);opacity:.7;text-align:center;}
.chess-board{display:grid;grid-template-columns:repeat(8,72px);grid-template-rows:repeat(8,72px);border:2px solid rgba(201,168,76,.45);}
.file-labels{display:flex;margin-top:6px;margin-left:22px;}
.file-labels span{width:72px;text-align:center;font-family:'Cinzel','Georgia',serif;font-size:11px;color:var(--gold);opacity:.7;}

/* Squares */
.sq{width:72px;height:72px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:filter .15s;}
.sq.light{background:var(--lsq)}.sq.dark{background:var(--dsq)}
.sq.sel-sq{background:#f6f669!important;box-shadow:inset 0 0 12px rgba(200,200,0,.4)}
.sq.lm-from,.sq.lm-to{background:rgba(20,85,30,.45)!important}
.sq.check-sq{background:rgba(210,0,0,.5)!important;animation:chkPulse 1s infinite alternate}
@keyframes chkPulse{from{background:rgba(210,0,0,.4)!important}to{background:rgba(210,0,0,.8)!important}}
.sq.leg-empty::after{content:'';position:absolute;width:32%;height:32%;border-radius:50%;background:rgba(0,0,0,.22);pointer-events:none;z-index:2;}
.sq.leg-cap::after{content:'';position:absolute;width:100%;height:100%;border:6px solid rgba(0,0,0,.22);border-radius:50%;background:transparent;pointer-events:none;z-index:2;}

/* Pieces */
.piece-img{width:62px;height:62px;position:relative;z-index:1;pointer-events:none;transition:transform .12s;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));}
.sq:hover .piece-img{transform:scale(1.1) translateY(-2px);filter:drop-shadow(0 6px 10px rgba(0,0,0,.6));}
.sq.sel-sq .piece-img{transform:scale(1.13) translateY(-3px);filter:drop-shadow(0 8px 14px rgba(0,0,0,.7));}

/* ── SIDE PANEL ── */
.side-panel{display:flex;flex-direction:column;gap:14px;width:210px}
.card{background:rgba(17,17,40,.85);border:1px solid rgba(201,168,76,.22);border-radius:12px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,.35);}
.card-title{font-family:'Cinzel','Georgia',serif;font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;opacity:.8;}
#status-text{font-family:'Cinzel','Georgia',serif;font-size:14px;color:#e8d5b7;text-align:center;min-height:22px;transition:color .3s;}
#thinking{display:none;text-align:center;color:var(--gold);font-size:11px;letter-spacing:3px;animation:pulse 1.4s infinite;margin-top:4px;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.cap-row{display:flex;flex-wrap:wrap;gap:2px;min-height:28px;align-items:center;}
.cap-piece{width:22px;height:22px;opacity:.85;}
#move-list{max-height:190px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gold-d) transparent;}
.mrow{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;}
.mn{color:var(--gold);opacity:.6;min-width:24px}.mw,.mb{min-width:56px;color:#e8d5b7;font-family:monospace;font-size:13px;}
.act-btn{width:100%;padding:9px;border-radius:7px;border:1px solid var(--gold-d);cursor:pointer;font-family:'Cinzel','Georgia',serif;font-size:10px;letter-spacing:2px;color:#e8d5b7;background:rgba(255,255,255,.03);transition:all .3s;text-transform:uppercase;margin-bottom:7px;}
.act-btn:last-child{margin-bottom:0}
.act-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold)}
.act-btn.undo{border-color:#3a6a7a;color:#70a5b8}
.act-btn.undo:hover{border-color:#70a5b8;background:rgba(112,165,184,.1)}
.notif-toggle{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.notif-label{font-family:'Cinzel','Georgia',serif;font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;}
.toggle-switch{position:relative;width:36px;height:20px;cursor:pointer;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;top:0;left:0;right:0;bottom:0;background:#2a2a4a;border-radius:20px;border:1px solid rgba(201,168,76,.3);transition:.3s;}
.toggle-thumb{position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:var(--gold-d);border-radius:50%;transition:.3s;}
input:checked+.toggle-track{background:rgba(201,168,76,.2);border-color:var(--gold);}
input:checked~.toggle-thumb{transform:translateX(16px);background:var(--gold);}

/* ── TOAST NOTIFICATIONS ── */
#toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{
  background:rgba(13,13,31,.95);border:1px solid rgba(201,168,76,.4);
  border-radius:10px;padding:10px 16px;
  font-family:'Cinzel','Georgia',serif;font-size:12px;letter-spacing:1px;
  color:#e8d5b7;min-width:200px;max-width:280px;
  box-shadow:0 4px 20px rgba(0,0,0,.5),0 0 20px rgba(201,168,76,.15);
  display:flex;align-items:center;gap:10px;
  animation:toastIn .3s ease;
  pointer-events:auto;
}
.toast.out{animation:toastOut .3s ease forwards;}
.toast-icon{font-size:18px;flex-shrink:0;}
.toast-body{display:flex;flex-direction:column;gap:2px;}
.toast-title{color:var(--gold);font-size:11px;letter-spacing:2px;}
.toast-msg{font-size:13px;color:#e8d5b7;}
.toast.check-toast{border-color:rgba(255,80,80,.5);box-shadow:0 4px 20px rgba(0,0,0,.5),0 0 20px rgba(255,80,80,.2);}
.toast.check-toast .toast-title{color:#ff8080;}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}

/* ── PROMOTION ── */
#promo-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center;}
.promo-box{background:var(--panel);border:2px solid var(--gold);border-radius:16px;padding:32px;text-align:center;box-shadow:0 0 65px rgba(201,168,76,.45);}
.promo-box h3{font-family:'Cinzel','Georgia',serif;color:var(--gold);letter-spacing:4px;margin-bottom:22px;font-size:13px;}
.promo-pieces{display:flex;gap:14px;}
.pp-btn{width:84px;height:84px;border-radius:10px;border:2px solid var(--gold-d);cursor:pointer;background:rgba(255,255,255,.03);transition:all .3s;display:flex;align-items:center;justify-content:center;}
.pp-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.15);transform:scale(1.1);}
.pp-btn svg{width:60px;height:60px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));}

/* ── GAME OVER ── */
#gameover{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:90;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.go-box{text-align:center;animation:popIn .5s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.go-title{font-family:'Cinzel Decorative','Georgia',serif;font-size:52px;color:var(--gold);text-shadow:0 0 50px rgba(201,168,76,.65);margin-bottom:8px;}
.go-sub{font-family:'Cinzel','Georgia',serif;font-size:19px;color:#e8d5b7;letter-spacing:4px;margin-bottom:30px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- SVG DEFS for piece gradients -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="wg" cx="38%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#fffff8"/>
      <stop offset="60%" stop-color="#f0e8d0"/>
      <stop offset="100%" stop-color="#c8b888"/>
    </radialGradient>
    <radialGradient id="bg" cx="38%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#4a4a6a"/>
      <stop offset="55%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <filter id="ps" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="ps2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="3" stdDeviation="3.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>
</svg>

<!-- SETUP -->
<div id="setup">
  <div class="game-title">♔ CHESS ♚</div>
  <div class="game-sub">A Royal Game</div>
  <div>
    <div class="setup-lbl">Choose Your Color</div>
    <div class="color-row">
      <div class="col-btn sel" id="btn-white" onclick="pickColor('white')">
        <svg class="ci-setup" viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">
          <g filter="url(#ps2)"><path d="M22.5,11.63V6M20,8h5M22.5,25c0,0,4.5-7.5,3-10.5c0,0-1-2.5-3-2.5s-3,2.5-3,2.5c-1.5,3,3,10.5,3,10.5z" fill="url(#wg)" stroke="#7a6a3a" stroke-width="1.5" stroke-linecap="round"/><path d="M11.5,37c5.5,3.5,15.5,3.5,21,0l0-7c0,0,9-4.5,6-10.5c-4-6.5-13.5-3.5-16,4l0,3.5l0-3.5c-2.5-7.5-12-10.5-16-4c-3,6,6,10.5,6,10.5l0,7z" fill="url(#wg)" stroke="#7a6a3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></g>
        </svg>
        <span>WHITE</span>
      </div>
      <div class="col-btn b" id="btn-black" onclick="pickColor('black')">
        <svg class="ci-setup" viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">
          <g filter="url(#ps2)"><path d="M22.5,11.63V6M20,8h5M22.5,25c0,0,4.5-7.5,3-10.5c0,0-1-2.5-3-2.5s-3,2.5-3,2.5c-1.5,3,3,10.5,3,10.5z" fill="url(#bg)" stroke="#b0a070" stroke-width="1.5" stroke-linecap="round"/><path d="M11.5,37c5.5,3.5,15.5,3.5,21,0l0-7c0,0,9-4.5,6-10.5c-4-6.5-13.5-3.5-16,4l0,3.5l0-3.5c-2.5-7.5-12-10.5-16-4c-3,6,6,10.5,6,10.5l0,7z" fill="url(#bg)" stroke="#b0a070" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></g>
        </svg>
        <span>BLACK</span>
      </div>
    </div>
  </div>
  <div>
    <div class="setup-lbl">Difficulty</div>
    <div class="diff-row">
      <div class="diff-btn" id="d-beginner" onclick="pickDiff('beginner',this)">Beginner</div>
      <div class="diff-btn sel" id="d-medium" onclick="pickDiff('medium',this)">Medium</div>
      <div class="diff-btn" id="d-hard" onclick="pickDiff('hard',this)">Hard</div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">Begin Game</button>
</div>

<!-- GAME -->
<div id="game">
  <div class="side-panel">
    <div class="card">
      <div class="card-title">Captured by You</div>
      <div class="cap-row" id="cap-player"></div>
    </div>
    <div class="card">
      <div class="card-title">Status</div>
      <div id="status-text">Your turn</div>
      <div id="thinking">Thinking…</div>
    </div>
    <div class="card">
      <div class="card-title">Captured by Computer</div>
      <div class="cap-row" id="cap-cpu"></div>
    </div>
    <div class="card">
      <div class="card-title">Move History</div>
      <div id="move-list"></div>
    </div>
    <div class="card">
      <div class="notif-toggle">
        <span class="notif-label">Notifications</span>
        <label class="toggle-switch">
          <input type="checkbox" id="notif-toggle" checked onchange="toggleNotif(this.checked)">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <button class="act-btn undo" onclick="undoMove()">↩ Retract Move</button>
      <button class="act-btn" onclick="newGame()">New Game</button>
    </div>
  </div>

  <div class="board-frame">
    <div class="board-with-ranks">
      <div class="rank-labels" id="rlabels"></div>
      <div class="chess-board" id="board"></div>
    </div>
    <div class="file-labels" id="flabels"></div>
  </div>
</div>

<!-- PROMOTION -->
<div id="promo-modal">
  <div class="promo-box">
    <h3>PROMOTE PAWN</h3>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <div class="go-box">
    <div class="go-title" id="go-title">CHECKMATE</div>
    <div class="go-sub" id="go-sub"></div>
    <button class="start-btn" onclick="newGame()">Play Again</button>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════
//  SVG PIECE DEFINITIONS
// ═══════════════════════════════════════════════
// Each returns an SVG string for the given color
const PIECES = {
  K: (fill, stroke) => `<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">
    <g filter="url(#ps2)">
      <path d="M22.5,11.63V6" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M20,8h5" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M22.5,25c0,0,4.5-7.5,3-10.5c0,0-1-2.5-3-2.5s-3,2.5-3,2.5c-1.5,3,3,10.5,3,10.5z" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M11.5,37c5.5,3.5,15.5,3.5,21,0v-7c0,0,9-4.5,6-10.5c-4-6.5-13.5-3.5-16,4v3.5v-3.5c-2.5-7.5-12-10.5-16-4c-3,6,6,10.5,6,10.5v7z" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    </g>
  </svg>`,

  Q: (fill, stroke) => `<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">
    <g filter="url(#ps2)">
      <circle cx="6" cy="12" r="2.75" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
      <circle cx="14" cy="9" r="2.75" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>

      <path d="M11.5,30c3.5-1,18.5-1,22,0" fill="none" stroke="${stroke}" stroke-width="1.5"/>
      <path d="M12,33.5c4-1.5,17-1.5,21,0" fill="none" stroke="${stroke}" stroke-width="1.5"/>
    </g>
  </svg>`,

  R: (fill, stroke) => `<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">
    <g filter="url(#ps2)">
      <path d="M9,39h27v-3H9v3z" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M12,36v-4h21v4H12z" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M11,14V9h4v2h5V9h5v2h5V9h4v5" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M34,14l-3,3H14l-3-3" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M31,17v15H14V17" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M31,32l1.5,4h-21L13,32" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"/>

      <path d="M31,14v3" fill="none" stroke="${stroke}" stroke-width="1.5"/>
    </g>
  </svg>`,

const W_FILL = 'url(#wg)';
const B_FILL = 'url(#bg)';
const W_STROKE = '#7a6a3a';
const B_STROKE = '#c0b090';

function pieceHTML(type, color) {
  const fill = color === 'white' ? W_FILL : B_FILL;
  const stroke = color === 'white' ? W_STROKE : B_STROKE;
  return PIECES[type](fill, stroke);
}

let notifsEnabled = true;

const PIECE_NAMES = {K:'King',Q:'Queen',R:'Rook',B:'Bishop',N:'Knight',P:'Pawn'};
const FILES = 'abcdefgh';

function toast(title, msg, type='') {
  if (!notifsEnabled) return;
  const tc = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = {check:'⚠️', capture:'⚔️', castle:'🏰', promo:'👑', '':'♟️'};
  t.innerHTML = `<span class="toast-icon">${icons[type]||icons['']}</span>
    <div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div>`;
  tc.appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300); }, 2800);
}

// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const WC='white', BC='black';
const VAL={P:100,N:320,B:330,R:500,Q:900,K:20000};
const PST={
  P:[[0,0,0,0,0,0,0,0],[50,50,50,50,50,50,50,50],[10,10,20,30,30,20,10,10],[5,5,10,25,25,10,5,5],[0,0,0,20,20,0,0,0],[5,-5,-10,0,0,-10,-5,5],[5,10,10,-20,-20,10,10,5],[0,0,0,0,0,0,0,0]],
  N:[[-50,-40,-30,-30,-30,-30,-40,-50],[-40,-20,0,0,0,0,-20,-40],[-30,0,10,15,15,10,0,-30],[-30,5,15,20,20,15,5,-30],[-30,0,15,20,20,15,0,-30],[-30,5,10,15,15,10,5,-30],[-40,-20,0,5,5,0,-20,-40],[-50,-40,-30,-30,-30,-30,-40,-50]],
  B:[[-20,-10,-10,-10,-10,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,10,10,5,0,-10],[-10,5,5,10,10,5,5,-10],[-10,0,10,10,10,10,0,-10],[-10,10,10,10,10,10,10,-10],[-10,5,0,0,0,0,5,-10],[-20,-10,-10,-10,-10,-10,-10,-20]],
  R:[[0,0,0,0,0,0,0,0],[5,10,10,10,10,10,10,5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[0,0,0,5,5,0,0,0]],
  Q:[[-20,-10,-10,-5,-5,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,5,5,5,0,-10],[-5,0,5,5,5,5,0,-5],[0,0,5,5,5,5,0,-5],[-10,5,5,5,5,5,0,-10],[-10,0,5,0,0,0,0,-10],[-20,-10,-10,-5,-5,-10,-10,-20]],
  K:[[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-20,-30,-30,-40,-40,-30,-30,-20],[-10,-20,-20,-20,-20,-20,-20,-10],[20,20,0,0,0,0,20,20],[20,30,10,0,0,10,30,20]]
};

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let board, turn, playerColor, difficulty;
let selSq, legalMvs, lastMv;
let cr, ep;
let history, capPlayer, capCPU;
let gameOver, cpuBusy, pendingPromo;
let setupColor = WC, setupDiff = 'medium';

function opp(c){return c===WC?BC:WC}
function inB(r,c){return r>=0&&r<8&&c>=0&&c<8}
function copyBoard(b){return b.map(r=>r.map(c=>c?{...c}:null))}

function initBoard(){
  board = Array(8).fill(null).map(()=>Array(8).fill(null));
  const br = ['R','N','B','Q','K','B','N','R'];
  for(let c=0;c<8;c++){
    board[0][c]={t:br[c],c:BC};board[1][c]={t:'P',c:BC};
    board[6][c]={t:'P',c:WC};board[7][c]={t:br[c],c:WC};
  }
}

// ═══════════════════════════════════════════════
//  MOVE GENERATION
// ═══════════════════════════════════════════════
function rawMoves(r, c, b, epSq, castR) {
  const p = b[r][c]; if(!p) return [];
  const col = p.c, en = opp(col), mvs = [];
  const dir = col===WC ? -1 : 1;

  function push(tr, tc, flags={}) {
    if(!inB(tr,tc)) return;
    const t = b[tr][tc];
    if(!t || t.c!==col) mvs.push({fr:{r,c}, to:{r:tr,c:tc}, ...flags});
  }
  function slide(dr, dc) {
    let tr=r+dr, tc=c+dc;
    while(inB(tr,tc)){
      const t=b[tr][tc];
      if(t){if(t.c!==col)mvs.push({fr:{r,c},to:{r:tr,c:tc}});break;}
      mvs.push({fr:{r,c},to:{r:tr,c:tc}});
      tr+=dr; tc+=dc;
    }
  }

  switch(p.t){
    case 'P':{
      const tr1=r+dir;
      if(inB(tr1,c)&&!b[tr1][c]){
        const promo=tr1===0||tr1===7;
        mvs.push({fr:{r,c},to:{r:tr1,c},promo});
        const sr=col===WC?6:1;
        if(r===sr){const tr2=r+2*dir;if(!b[tr2][c])mvs.push({fr:{r,c},to:{r:tr2,c},dbl:true});}
      }
      for(const dc of[-1,1]){
        const tc=c+dc;
        if(inB(tr1,tc)){
          const t=b[tr1][tc];
          if(t&&t.c===en) mvs.push({fr:{r,c},to:{r:tr1,c:tc},promo:tr1===0||tr1===7});
          if(epSq&&tr1===epSq.r&&tc===epSq.c) mvs.push({fr:{r,c},to:{r:tr1,c:tc},ep:true});
        }
      }
      break;
    }
    case 'N':for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]])push(r+dr,c+dc);break;
    case 'B':slide(-1,-1);slide(-1,1);slide(1,-1);slide(1,1);break;
    case 'R':slide(-1,0);slide(1,0);slide(0,-1);slide(0,1);break;
    case 'Q':slide(-1,-1);slide(-1,1);slide(1,-1);slide(1,1);slide(-1,0);slide(1,0);slide(0,-1);slide(0,1);break;
    case 'K':{
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)if(dr||dc)push(r+dr,c+dc);
      if(castR){
        if(col===WC&&r===7&&c===4){
          if(castR.wK&&!b[7][5]&&!b[7][6]&&b[7][7]?.t==='R'&&b[7][7]?.c===WC)
            mvs.push({fr:{r,c},to:{r:7,c:6},castle:'K'});
          if(castR.wQ&&!b[7][3]&&!b[7][2]&&!b[7][1]&&b[7][0]?.t==='R'&&b[7][0]?.c===WC)
            mvs.push({fr:{r,c},to:{r:7,c:2},castle:'Q'});
        }
        if(col===BC&&r===0&&c===4){
          if(castR.bK&&!b[0][5]&&!b[0][6]&&b[0][7]?.t==='R'&&b[0][7]?.c===BC)
            mvs.push({fr:{r,c},to:{r:0,c:6},castle:'K'});
          if(castR.bQ&&!b[0][3]&&!b[0][2]&&!b[0][1]&&b[0][0]?.t==='R'&&b[0][0]?.c===BC)
            mvs.push({fr:{r,c},to:{r:0,c:2},castle:'Q'});
        }
      }
      break;
    }
  }
  return mvs;
}

function attacked(r, c, byCol, b) {
  for(let rr=0;rr<8;rr++) for(let cc=0;cc<8;cc++){
    const p=b[rr][cc];
    if(p&&p.c===byCol){
      const ms=rawMoves(rr,cc,b,null,null);
      if(ms.some(m=>m.to.r===r&&m.to.c===c)) return true;
    }
  }
  return false;
}

function kingPos(col, b) {
  for(let r=0;r<8;r++) for(let c=0;c<8;c++)
    if(b[r][c]?.t==='K'&&b[r][c]?.c===col) return{r,c};
  return null;
}

function inCheck(col, b) {
  const k=kingPos(col,b);
  return k ? attacked(k.r,k.c,opp(col),b) : true;
}

function applyMv(mv, b, castR, col) {
  const nb=copyBoard(b), ncr={...castR};
  let nep=null;
  const p=nb[mv.fr.r][mv.fr.c];
  nb[mv.to.r][mv.to.c]=p; nb[mv.fr.r][mv.fr.c]=null;
  if(mv.ep) nb[mv.fr.r][mv.to.c]=null;
  if(mv.castle){
    const rr=mv.to.r;
    if(mv.castle==='K'){nb[rr][5]=nb[rr][7];nb[rr][7]=null;}
    else{nb[rr][3]=nb[rr][0];nb[rr][0]=null;}
  }
  if(mv.promT) nb[mv.to.r][mv.to.c]={t:mv.promT,c:col};
  if(p.t==='K'){if(col===WC){ncr.wK=false;ncr.wQ=false;}else{ncr.bK=false;ncr.bQ=false;}}
  if(p.t==='R'){
    if(mv.fr.r===7&&mv.fr.c===7)ncr.wK=false;
    if(mv.fr.r===7&&mv.fr.c===0)ncr.wQ=false;
    if(mv.fr.r===0&&mv.fr.c===7)ncr.bK=false;
    if(mv.fr.r===0&&mv.fr.c===0)ncr.bQ=false;
  }
  if(mv.to.r===7&&mv.to.c===7)ncr.wK=false;
  if(mv.to.r===7&&mv.to.c===0)ncr.wQ=false;
  if(mv.to.r===0&&mv.to.c===7)ncr.bK=false;
  if(mv.to.r===0&&mv.to.c===0)ncr.bQ=false;
  if(mv.dbl) nep={r:(mv.fr.r+mv.to.r)/2,c:mv.to.c};
  return{nb,ncr,nep};
}

function legalForColor(col, b, epSq, castR) {
  const mvs=[];
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const p=b[r][c]; if(!p||p.c!==col) continue;
    const raw=rawMoves(r,c,b,epSq,castR);
    for(const mv of raw){
      if(mv.castle){
        if(inCheck(col,b)) continue;
        const pc=mv.castle==='K'?5:3;
        if(attacked(mv.fr.r,pc,opp(col),b)) continue;
      }
      const{nb}=applyMv(mv,b,castR,col);
      if(!inCheck(col,nb)) mvs.push(mv);
    }
  }
  return mvs;
}

function legalForPiece(r, c, b, epSq, castR) {
  const p=b[r][c]; if(!p) return[];
  return legalForColor(p.c,b,epSq,castR).filter(m=>m.fr.r===r&&m.fr.c===c);
}

// ═══════════════════════════════════════════════
//  AI
// ═══════════════════════════════════════════════
function evalBoard(b) {
  let s=0;
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const p=b[r][c]; if(!p) continue;
    const tr=p.c===WC?r:7-r;
    const pst=PST[p.t]?PST[p.t][tr][c]:0;
    s+=(p.c===WC?1:-1)*(VAL[p.t]+pst);
  }
  return s;
}

function minimax(b, depth, alpha, beta, maxing, epSq, castR) {
  const col=maxing?WC:BC;
  const mvs=legalForColor(col,b,epSq,castR);
  if(!mvs.length) return inCheck(col,b)?(maxing?-1e6:1e6):0;
  if(depth===0) return evalBoard(b);
  mvs.sort((a,bm)=>(b[bm.to.r][bm.to.c]?1:0)-(b[a.to.r][a.to.c]?1:0));
  if(maxing){
    let best=-Infinity;
    for(const mv of mvs){
      const fm=mv.promo?{...mv,promT:'Q'}:mv;
      const{nb,ncr,nep}=applyMv(fm,b,castR,col);
      best=Math.max(best,minimax(nb,depth-1,alpha,beta,false,nep,ncr));
      alpha=Math.max(alpha,best); if(beta<=alpha) break;
    }
    return best;
  }else{
    let best=Infinity;
    for(const mv of mvs){
      const fm=mv.promo?{...mv,promT:'Q'}:mv;
      const{nb,ncr,nep}=applyMv(fm,b,castR,col);
      best=Math.min(best,minimax(nb,depth-1,alpha,beta,true,nep,ncr));
      beta=Math.min(beta,best); if(beta<=alpha) break;
    }
    return best;
  }
}

function bestMove(b, epSq, castR, col, diff) {
  const mvs=legalForColor(col,b,epSq,castR);
  if(!mvs.length) return null;
  if(diff==='beginner') return mvs[Math.floor(Math.random()*mvs.length)];
  const depth=diff==='medium'?2:4;
  const maxing=col===WC;
  if(diff==='medium') mvs.sort(()=>Math.random()-.5);
  let best=null, bestVal=maxing?-Infinity:Infinity;
  for(const mv of mvs){
    const fm=mv.promo?{...mv,promT:'Q'}:mv;
    const{nb,ncr,nep}=applyMv(fm,b,castR,col);
    const val=minimax(nb,depth-1,-Infinity,Infinity,!maxing,nep,ncr);
    if(maxing?val>bestVal:val<bestVal){bestVal=val;best=fm;}
  }
  return best;
}

function pickColor(c){
  setupColor=c;
  document.getElementById('btn-white').classList.toggle('sel',c===WC);
  document.getElementById('btn-black').classList.toggle('sel',c===BC);
}
function pickDiff(d, el){
  setupDiff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}
function startGame(){
  playerColor=setupColor; difficulty=setupDiff;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='flex';
  resetState(); drawLabels(); render();
  if(playerColor===BC) setTimeout(doCPU,600);
}

  document.getElementById('gameover').style.display='none';
  document.getElementById('game').style.display='none';
  document.getElementById('setup').style.display='flex';
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function resetState(){
  initBoard(); turn=WC; selSq=null; legalMvs=[]; lastMv=null;
  cr={wK:true,wQ:true,bK:true,bQ:true}; ep=null;
  history=[]; capPlayer=[]; capCPU=[];
  gameOver=false; cpuBusy=false; pendingPromo=null;
  document.getElementById('gameover').style.display='none';
  updateStatus(); updateCap(); renderHistory();
}

function execMove(mv, promType) {
  const col=turn;
  if(mv.promo&&!mv.promT){
    if(promType){mv={...mv,promT:promType};}
    else{pendingPromo=mv; showPromo(col); return;}
  }
  const cap=board[mv.to.r][mv.to.c];
  if(cap)(col===playerColor?capPlayer:capCPU).push(cap);
  if(mv.ep)(col===playerColor?capPlayer:capCPU).push({t:'P',c:opp(col)});

  history.push({
    board:copyBoard(board),cr:{...cr},
    ep:ep?{...ep}:null,turn,
    capPlayer:[...capPlayer],capCPU:[...capCPU],
    lastMv:lastMv?{...lastMv,fr:{...lastMv.fr},to:{...lastMv.to}}:null,
    mv
  });

  const{nb,ncr,nep}=applyMv(mv,board,cr,col);
  board=nb; cr=ncr; ep=nep; lastMv=mv; turn=opp(col);
  selSq=null; legalMvs=[];

  // Notifications
  fireNotif(mv, cap, col, board);

  render(); updateCap(); renderHistory(); checkEnd();
  if(!gameOver&&turn!==playerColor) setTimeout(doCPU,280);
}

function fireNotif(mv, cap, col, boardAfter) {
  const piece=history[history.length-1]?.board[mv.fr.r][mv.fr.c];
  const pname=piece?PIECE_NAMES[piece.t]:'Piece';
  const toFile=FILES[mv.to.c], toRank=8-mv.to.r;
  const actor=col===playerColor?'You':'Computer';

  if(mv.castle){
    toast('Castling',`${actor} castled ${mv.castle==='K'?'Kingside':'Queenside'}`,'castle');
  } else if(mv.promT){
    toast('Promotion!',`Pawn promoted to ${PIECE_NAMES[mv.promT]}`,'promo');
  } else if(cap||mv.ep){
    const capName=cap?PIECE_NAMES[cap.t]:'Pawn';
    toast('Capture',`${actor}: ${pname} captures ${capName} on ${toFile}${toRank}`,'capture');
  } else {
    toast(actor===playerColor?'Your Move':'Computer Moved',`${pname} to ${toFile}${toRank}`);
  }

  if(inCheck(opp(col),boardAfter)){
    setTimeout(()=>toast('Check!',`${opp(col)==='white'?'White':'Black'} king is in check`,'check'),400);
  }
}

function showPromo(col){
  const modal=document.getElementById('promo-modal');
  const cont=document.getElementById('promo-pieces');
  modal.style.display='flex';
  cont.innerHTML='';
  for(const t of['Q','R','B','N']){
    const btn=document.createElement('button');
    btn.className='pp-btn';
    btn.innerHTML=pieceHTML(t,col);
    btn.onclick=()=>{
      modal.style.display='none';
      const mv=pendingPromo; pendingPromo=null; execMove(mv,t);
    };
    cont.appendChild(btn);
  }
}

function doCPU(){
  if(gameOver||turn===playerColor) return;
  cpuBusy=true;
  document.getElementById('thinking').style.display='block';
  document.getElementById('status-text').textContent='Thinking…';
  setTimeout(()=>{
    const mv=bestMove(board,ep,cr,turn,difficulty);
    cpuBusy=false;
    document.getElementById('thinking').style.display='none';
    if(mv) execMove(mv,mv.promT||(mv.promo?'Q':null));
    updateStatus();
  },60);
}

function checkEnd(){
  const mvs=legalForColor(turn,board,ep,cr);
  if(!mvs.length){
    gameOver=true;
    if(inCheck(turn,board)){
      const winner=opp(turn);
      showEnd('CHECKMATE',winner===playerColor?'You Win!':'Computer Wins!');
      toast('Game Over',winner===playerColor?'Checkmate — you win!':'Checkmate — computer wins!','check');
    }else{
      showEnd('STALEMATE','Draw by Stalemate');
      toast('Game Over','Stalemate — draw!');
    }
  }
  updateStatus();
}

function showEnd(title,sub){
  document.getElementById('go-title').textContent=title;
  document.getElementById('go-sub').textContent=sub;
  document.getElementById('gameover').style.display='flex';
}

function undoMove(){
  if(gameOver){document.getElementById('gameover').style.display='none';gameOver=false;}
  if(!history.length) return;
  cpuBusy=false;
  const count=history.length>=2&&turn===playerColor?2:1;
  for(let i=0;i<count&&history.length;i++){
    const s=history.pop();
    board=s.board; cr=s.cr; ep=s.ep; turn=s.turn;
    capPlayer=s.capPlayer; capCPU=s.capCPU; lastMv=s.lastMv;
  }
  selSq=null; legalMvs=[];
  if(notifsEnabled) toast('Move Retracted','Returned to previous position');
  render(); updateCap(); renderHistory(); updateStatus();
}

// ═══════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════
function d2b(dr,dc){return playerColor===WC?{r:dr,c:dc}:{r:7-dr,c:7-dc};}

function render(){
  const el=document.getElementById('board');
  el.innerHTML='';
  const legSet=new Set(legalMvs.map(m=>`${m.to.r},${m.to.c}`));

  for(let dr=0;dr<8;dr++) for(let dc=0;dc<8;dc++){
    const{r,c}=d2b(dr,dc);
    const p=board[r][c];
    const sq=document.createElement('div');
    sq.className=`sq ${(r+c)%2===0?'light':'dark'}`;

    if(selSq&&selSq.r===r&&selSq.c===c) sq.classList.add('sel-sq');
    if(lastMv){
      if(lastMv.fr.r===r&&lastMv.fr.c===c) sq.classList.add('lm-from');
      if(lastMv.to.r===r&&lastMv.to.c===c) sq.classList.add('lm-to');
    }
    if(!gameOver&&inCheck(turn,board)){
      const k=kingPos(turn,board);
      if(k&&k.r===r&&k.c===c) sq.classList.add('check-sq');
    }
    if(selSq&&legSet.has(`${r},${c}`)){
      sq.classList.add(board[r][c]?'leg-cap':'leg-empty');
    }
    if(p){
      const wrapper=document.createElement('div');
      wrapper.className='piece-img';
      wrapper.innerHTML=pieceHTML(p.t,p.c);
      sq.appendChild(wrapper);
    }
    sq.addEventListener('click',()=>onClick(r,c));
    el.appendChild(sq);
  }
}

function onClick(r,c){
  if(gameOver||cpuBusy||turn!==playerColor) return;
  const p=board[r][c];
  if(selSq){
    const mv=legalMvs.find(m=>m.to.r===r&&m.to.c===c);
    if(mv){execMove(mv);return;}
    if(p&&p.c===playerColor){selSq={r,c};legalMvs=legalForPiece(r,c,board,ep,cr);render();return;}
    selSq=null; legalMvs=[]; render(); return;
  }
  if(p&&p.c===playerColor){selSq={r,c};legalMvs=legalForPiece(r,c,board,ep,cr);render();}
}

function drawLabels(){
  const rl=document.getElementById('rlabels');
  const fl=document.getElementById('flabels');
  if(playerColor===WC){
    rl.innerHTML=[8,7,6,5,4,3,2,1].map(n=>`<span>${n}</span>`).join('');
    fl.innerHTML=['a','b','c','d','e','f','g','h'].map(l=>`<span>${l}</span>`).join('');
  }else{
    rl.innerHTML=[1,2,3,4,5,6,7,8].map(n=>`<span>${n}</span>`).join('');
    fl.innerHTML=['h','g','f','e','d','c','b','a'].map(l=>`<span>${l}</span>`).join('');
  }
}

function updateStatus(){
  const el=document.getElementById('status-text');
  if(gameOver){el.textContent='Game over';el.style.color='#e8d5b7';return;}
  const chk=inCheck(turn,board);
  if(turn===playerColor){
    el.textContent=chk?'You are in check!':'Your turn';
    el.style.color=chk?'#ff7070':'#e8d5b7';
  }else{
    el.textContent=chk?'Computer in check':"Computer's turn";
    el.style.color=chk?'#ff7070':'#e8d5b7';
  }
}

function updateCap(){
  document.getElementById('cap-player').innerHTML=
    capPlayer.map(p=>`<div class="piece-img cap-piece">${pieceHTML(p.t,p.c)}</div>`).join('');
  document.getElementById('cap-cpu').innerHTML=
    capCPU.map(p=>`<div class="piece-img cap-piece">${pieceHTML(p.t,p.c)}</div>`).join('');
}

function mvToAN(mv, b){
  const p=b[mv.fr.r][mv.fr.c]; if(!p) return'?';
  const tf=FILES[mv.to.c], tr=8-mv.to.r;
  if(mv.castle) return mv.castle==='K'?'O-O':'O-O-O';
  let s='';
  if(p.t!=='P') s+=p.t;
  const cap=b[mv.to.r][mv.to.c]||mv.ep;
  if(p.t==='P'&&cap) s+=FILES[mv.fr.c];
  if(cap) s+='x';
  s+=tf+tr;
  if(mv.promT) s+='='+mv.promT;
  return s;
}

function renderHistory(){
  const el=document.getElementById('move-list');
  el.innerHTML='';
  for(let i=0;i<history.length;i+=2){
    const w=history[i], bl=history[i+1];
    const div=document.createElement('div');
    div.className='mrow';
    const wan=mvToAN(w.mv,w.board);
    const ban=bl?mvToAN(bl.mv,bl.board):'';
    div.innerHTML=`<span class="mn">${i/2+1}.</span><span class="mw">${wan}</span><span class="mb">${ban}</span>`;
    el.appendChild(div);
  }
  el.scrollTop=el.scrollHeight;
}
</script>
